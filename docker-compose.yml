version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: dataone
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
    restart: always
    ports:
      - "8886:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: pma
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    restart: always
    ports:
      - "8899:80"

  nestjs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/usr/src/app               # mount project for live reload
      - /usr/src/app/node_modules    # preserve node_modules inside container
    ports:
      - "3001:3000"                  # map container port to host
    env_file:
      - .env                         # load environment variables
    command: yarn start:dev          # dev mode with watch
    restart: always

volumes:
  dbdata: